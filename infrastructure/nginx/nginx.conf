upstream backend {
    server backend:3000;
}

# HTTP -> HTTPS redirect (for production with SSL termination at load balancer)
# For local dev: comment out the 443 block and use port 80 only

server {
    listen 80;
    server_name localhost app.buddypay.com api.buddypay.com;

    # Frontend — serve through nginx static (or proxy to frontend container)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Backend health endpoints (not proxied through /api/)
    location ~ ^/(health|ready)$ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
